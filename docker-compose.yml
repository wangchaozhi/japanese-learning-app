services:
  postgres:
    image: postgres:16-alpine
    container_name: japanese-learning-app-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: japanese_learning_app
      POSTGRES_USER: japanese_learning
      POSTGRES_PASSWORD: japanese_learning_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U japanese_learning -d japanese_learning_app"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: japanese-learning-app-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: japanese_learning
      MINIO_ROOT_PASSWORD: japanese_learning_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  minio_data:
